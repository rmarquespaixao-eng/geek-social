name: geek-social

# Sobe Postgres + MinIO (S3) + API + Frontend + Docs em um único comando:
#   docker compose up -d
#
# Defaults são DEV-ONLY. Para produção, copie .env.example -> .env e troque
# JWT_SECRET, MINIO_ROOT_PASSWORD, POSTGRES_PASSWORD e o par VAPID_*.

services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dev}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev}
      POSTGRES_DB: ${POSTGRES_DB:-geek_social}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dev} -d ${POSTGRES_DB:-geek_social}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly no --save ""
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-geek-social-media}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 \"$$MINIO_ROOT_USER\" \"$$MINIO_ROOT_PASSWORD\" &&
      mc mb --ignore-existing local/$$S3_BUCKET_NAME &&
      mc anonymous set download local/$$S3_BUCKET_NAME &&
      echo 'minio-init: bucket pronto'
      "
    restart: "no"

  api-migrate:
    build:
      context: ./api
      target: builder
    command: npm run db:migrate
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-dev}:${POSTGRES_PASSWORD:-dev}@db:5432/${POSTGRES_DB:-geek_social}
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: ./api
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-dev}:${POSTGRES_PASSWORD:-dev}@db:5432/${POSTGRES_DB:-geek_social}
      JOBS_DATABASE_URL: postgresql://${POSTGRES_USER:-dev}:${POSTGRES_PASSWORD:-dev}@db:5432/geek_social_jobs
      REDIS_URL: redis://redis:6379
      TRUST_PROXY: ${TRUST_PROXY:-false}
      JWT_SECRET: ${JWT_SECRET:-dev-only-secret-change-me-in-production-please-32}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      REFRESH_TOKEN_EXPIRES_DAYS: ${REFRESH_TOKEN_EXPIRES_DAYS:-7}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-geek-social-media}
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_PUBLIC_URL: http://localhost:${MINIO_API_PORT:-9000}/${S3_BUCKET_NAME:-geek-social-media}
      SES_FROM_EMAIL: ${SES_FROM_EMAIL:-noreply@geek-social.local}
      APP_URL: http://localhost:${API_PORT:-3000}
      FRONTEND_URL: http://localhost:${FRONTEND_PORT:-8080}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-BEzO3HA6qWVExkbRErzPLMTZ2e3DOH1NZSZvNdUXl5pynzU2rb3u2hIeUS8YNCvchHMTZNFRgOlNunQm0BmELJg}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-3NdUXAc798ZiD-j4CmcxvGew8oN6SGRELe94KixK7QU}
      VAPID_CONTACT: ${VAPID_CONTACT:-dev@geek-social.local}
      GOOGLE_OAUTH_ENABLED: ${GOOGLE_OAUTH_ENABLED:-false}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
    ports:
      - "${API_PORT:-3000}:3000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      api-migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:${API_PORT:-3000}
        VITE_SOCKET_URL: http://localhost:${API_PORT:-3000}
        VITE_VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-BEzO3HA6qWVExkbRErzPLMTZ2e3DOH1NZSZvNdUXl5pynzU2rb3u2hIeUS8YNCvchHMTZNFRgOlNunQm0BmELJg}
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      - api
    restart: unless-stopped

  admin:
    build:
      context: ./admin
      args:
        VITE_API_URL: http://localhost:${API_PORT:-3000}
    ports:
      - "${ADMIN_PORT:-8090}:80"
    depends_on:
      - api
    restart: unless-stopped

  docs:
    build:
      context: ./docs
    ports:
      - "${DOCS_PORT:-3030}:3030"
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:
